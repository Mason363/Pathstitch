name: 💡 Feature request / suggestion
description: Suggest an idea or improvement.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Have an idea? Great. Tell me what you're trying to do — the underlying
        goal matters more than a specific implementation.
  - type: textarea
    id: problem
    attributes:
      label: What are you trying to do?
      description: The workflow or problem this would help with.
      placeholder: When I prep a pattern for laser cutting, I have to…
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: What would you like to see?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives or workarounds you've tried
  - type: dropdown
    id: area
    attributes:
      label: Which part of the app?
      multiple: true
      options:
        - 2D editing
        - 3D / unfold
        - Holes / sewing
        - Import / export
        - Quick Look previews
        - Onboarding / UI
        - Other
