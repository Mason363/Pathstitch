<?xml version="1.0" encoding="UTF-8"?>
<!--
  DIMENSIONED guide for laser-cutting/engraving the Pathstitch DMG background on a
  100 × 100 mm (10 × 10 cm) leather piece, drawn in Pathstitch.

  All numbers are millimetres. Origin is BOTTOM-LEFT (X right, Y up), matching
  Pathstitch. Drawn here at 4 px = 1 mm. ENGRAVE the title, subtitle and arrow
  (and the optional border); leave the two red icon zones — and the strip just
  below each — BLANK, because the real app + Applications icons (and their names)
  render on top in the installer window.
-->
<svg xmlns="http://www.w3.org/2000/svg" width="600" height="560" viewBox="0 0 600 560"
     font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="da" markerWidth="9" markerHeight="9" refX="8" refY="4.5"
            orient="auto-start-reverse" markerUnits="userSpaceOnUse">
      <path d="M0,0 L9,4.5 L0,9 Z" fill="#1f6fb2"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="600" height="560" fill="#ffffff"/>

  <!-- ===== The 100×100 mm leather piece (x70..470, y70..470) ===== -->
  <rect x="70" y="70" width="400" height="400" fill="#fbf7f1" stroke="#2b2b2b" stroke-width="2"/>

  <!-- Optional decorative border: inset 4 mm, radius 6 mm -->
  <rect x="86" y="86" width="368" height="368" rx="24" fill="none"
        stroke="#8a6d4f" stroke-width="1.5" stroke-dasharray="5 4"/>

  <!-- Title / subtitle (engrave) -->
  <text x="270" y="150" text-anchor="middle" font-size="22" font-weight="700" fill="#444">Install Pathstitch</text>
  <text x="270" y="186" text-anchor="middle" font-size="12" fill="#666">Drag the app onto the Applications folder</text>

  <!-- Icon zones: 20×20 mm, KEEP CLEAR (red dashed) -->
  <rect x="150" y="238" width="80" height="80" rx="12" fill="#fdecea" stroke="#c0392b" stroke-width="2" stroke-dasharray="6 4"/>
  <rect x="310" y="238" width="80" height="80" rx="12" fill="#fdecea" stroke="#c0392b" stroke-width="2" stroke-dasharray="6 4"/>
  <text x="190" y="274" text-anchor="middle" font-size="11" fill="#c0392b">app icon</text>
  <text x="190" y="290" text-anchor="middle" font-size="9"  fill="#c0392b">keep clear</text>
  <text x="350" y="274" text-anchor="middle" font-size="11" fill="#c0392b">Applications</text>
  <text x="350" y="290" text-anchor="middle" font-size="9"  fill="#c0392b">keep clear</text>

  <!-- Drag arrow (engrave): X 43→57, Y 48 -->
  <line x1="242" y1="278" x2="294" y2="278" stroke="#2b2b2b" stroke-width="2.5" marker-end="url(#da)"/>
  <text x="268" y="268" text-anchor="middle" font-size="9" fill="#2b2b2b">drag</text>

  <!-- ===== HORIZONTAL dimension chain (below the piece), each = 20 mm ===== -->
  <!-- extension lines down from the piece bottom / features -->
  <g stroke="#bcd0e6" stroke-width="1">
    <line x1="70"  y1="470" x2="70"  y2="545"/>
    <line x1="150" y1="318" x2="150" y2="515"/>
    <line x1="230" y1="318" x2="230" y2="515"/>
    <line x1="310" y1="318" x2="310" y2="515"/>
    <line x1="390" y1="318" x2="390" y2="515"/>
    <line x1="470" y1="470" x2="470" y2="545"/>
  </g>
  <!-- chain dim line at y=508 -->
  <g stroke="#1f6fb2" stroke-width="1" fill="#1f6fb2" font-size="11" text-anchor="middle">
    <line x1="70"  y1="508" x2="150" y2="508" marker-start="url(#da)" marker-end="url(#da)"/>
    <line x1="150" y1="508" x2="230" y2="508" marker-start="url(#da)" marker-end="url(#da)"/>
    <line x1="230" y1="508" x2="310" y2="508" marker-start="url(#da)" marker-end="url(#da)"/>
    <line x1="310" y1="508" x2="390" y2="508" marker-start="url(#da)" marker-end="url(#da)"/>
    <line x1="390" y1="508" x2="470" y2="508" marker-start="url(#da)" marker-end="url(#da)"/>
    <g stroke="none">
      <rect x="100" y="500" width="20" height="13" fill="#fff"/><text x="110" y="510">20</text>
      <rect x="180" y="500" width="20" height="13" fill="#fff"/><text x="190" y="510">20</text>
      <rect x="260" y="500" width="20" height="13" fill="#fff"/><text x="270" y="510">20</text>
      <rect x="340" y="500" width="20" height="13" fill="#fff"/><text x="350" y="510">20</text>
      <rect x="420" y="500" width="20" height="13" fill="#fff"/><text x="430" y="510">20</text>
    </g>
  </g>
  <!-- overall width -->
  <g stroke="#1f6fb2" stroke-width="1" fill="#1f6fb2" font-size="12" text-anchor="middle">
    <line x1="70" y1="538" x2="470" y2="538" marker-start="url(#da)" marker-end="url(#da)"/>
    <g stroke="none"><rect x="248" y="530" width="44" height="14" fill="#fff"/><text x="270" y="541" font-weight="700">100 mm</text></g>
  </g>

  <!-- ===== VERTICAL dimension chain (left of the piece): 42 / 20 / 38 mm ===== -->
  <g stroke="#bcd0e6" stroke-width="1">
    <line x1="70"  y1="70"  x2="40" y2="70"/>
    <line x1="150" y1="238" x2="40" y2="238"/>
    <line x1="150" y1="318" x2="40" y2="318"/>
    <line x1="70"  y1="470" x2="40" y2="470"/>
  </g>
  <g stroke="#1f6fb2" stroke-width="1" fill="#1f6fb2" font-size="11" text-anchor="middle">
    <line x1="50" y1="70"  x2="50" y2="238" marker-start="url(#da)" marker-end="url(#da)"/>
    <line x1="50" y1="238" x2="50" y2="318" marker-start="url(#da)" marker-end="url(#da)"/>
    <line x1="50" y1="318" x2="50" y2="470" marker-start="url(#da)" marker-end="url(#da)"/>
    <g stroke="none">
      <rect x="40" y="148" width="20" height="13" fill="#fff"/><text x="50" y="158">42</text>
      <rect x="40" y="271" width="20" height="13" fill="#fff"/><text x="50" y="281">20</text>
      <rect x="40" y="387" width="20" height="13" fill="#fff"/><text x="50" y="397">38</text>
    </g>
  </g>
  <!-- overall height -->
  <g stroke="#1f6fb2" stroke-width="1" fill="#1f6fb2" font-size="12" text-anchor="middle">
    <line x1="24" y1="70" x2="24" y2="470" marker-start="url(#da)" marker-end="url(#da)"/>
    <g stroke="none" transform="translate(24,270) rotate(-90)">
      <rect x="-22" y="-7" width="44" height="14" fill="#fff"/><text x="0" y="4" font-weight="700">100 mm</text>
    </g>
  </g>

  <!-- ===== Right-side callouts ===== -->
  <g font-size="11" fill="#333">
    <!-- title baseline 81 mm -->
    <line x1="370" y1="150" x2="500" y2="150" stroke="#aaa" stroke-width="1" stroke-dasharray="3 3"/>
    <text x="504" y="147">Title — baseline Y = 81 mm,</text>
    <text x="504" y="161">cap height ≈ 7 mm, centered X = 50</text>
    <!-- subtitle baseline 72 mm -->
    <line x1="392" y1="186" x2="500" y2="186" stroke="#aaa" stroke-width="1" stroke-dasharray="3 3"/>
    <text x="504" y="190">Subtitle — baseline Y = 72 mm,</text>
    <text x="504" y="204">cap height ≈ 3.5 mm (optional)</text>
    <!-- icon zone callout -->
    <line x1="390" y1="278" x2="500" y2="250" stroke="#c0392b" stroke-width="1" stroke-dasharray="3 3"/>
    <text x="504" y="248" fill="#c0392b">Icon zones: 20 × 20 mm,</text>
    <text x="504" y="262" fill="#c0392b">centers Y = 48 mm (X = 30 &amp; 70).</text>
    <text x="504" y="276" fill="#c0392b">Leave blank — icons + names</text>
    <text x="504" y="290" fill="#c0392b">render on top in the installer.</text>
    <!-- arrow callout -->
    <text x="504" y="316">Arrow: Y = 48 mm, X 43 → 57 mm</text>
  </g>

  <!-- footer -->
  <text x="270" y="556" text-anchor="middle" font-size="10" fill="#888">
    Units mm · origin bottom-left · piece 100 × 100 mm · 5 segments of 20 mm = 100
  </text>
</svg>
